services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: gtd
      POSTGRES_PASSWORD: gtd
      POSTGRES_DB: gtd
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gtd -d gtd"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/gtd-graph-password
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      GTD_ARTIFACT_DIR: /app/artifacts
      GTD_DATASET_DIR: /app/Dataset
      DATABASE_URL: postgresql+psycopg://gtd:gtd@postgres:5432/gtd
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: gtd-graph-password
      QDRANT_URL: http://qdrant:6333
      WANDB_PROJECT: gtd-capstone
      WANDB_MODE: offline
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./Dataset:/app/Dataset:ro
      - ./artifacts:/app/artifacts

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:

